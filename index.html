<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Cete</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding-top: 100px; 
            background: #ffeef2; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            display: inline-block; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(225, 48, 108, 0.15); 
            border: 2px solid #ffb6c1;
        }
        h1 { 
            color: #d63384; 
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #6c757d;
            font-size: 1.1rem;
        }
        .heart {
            font-size: 50px;
            animation: beat .25s infinite alternate;
            display: inline-block;
        }
        @keyframes beat {
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">❤️</div>
        <h1>hallo cete ku sayang</h1>
        <p>Website ini khusus dibuat untuk kamu!</p>
    </div>
</body>
</html>
